# Deploy Supabase migrations and Edge Functions (Deliverable 2).
#
# Runs only on workflow_dispatch (manual). Credentials below are for that run; do not use a public repo
# unless you accept token/password visibility. Project ref matches supabase/config.toml (project_id).

name: Supabase deploy

# Manual only: push trigger disabled so normal commits do not run deploy.
# Re-enable push below when you want automatic deploys on supabase/ changes.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - "supabase/migrations/**"
  #     - "supabase/functions/**"
  #     - "supabase/config.toml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: "sbp_f85ae33999955e88dbac200b01cbb1cf3f0b6ccf"
      SUPABASE_DB_PASSWORD: "BB-11-pgh"
      SUPABASE_PROJECT_ID: mavbnybtyfewfsihmuri
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ "$SUPABASE_ACCESS_TOKEN" = "YOUR_SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Set SUPABASE_ACCESS_TOKEN in the workflow env."
            exit 1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::warning::SUPABASE_DB_PASSWORD is empty; db push may fail SCRAM auth."
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_ID"

      # Remote may have newer migration versions while repo still has older files not yet
      # recorded as applied (e.g. Lovable vs Git). CLI requires explicit opt-in.
      # SUPABASE_DB_PASSWORD (env) makes the CLI use password auth when the pooler login path fails.
      - name: Push database migrations
        run: supabase db push --include-all --yes

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
