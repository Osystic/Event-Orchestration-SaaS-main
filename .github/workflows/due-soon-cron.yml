# Daily due-soon reminder batch (Deliverable 2). Invokes Edge Function send-event-notification.
# Replace env values below. CRON_SECRET optional — leave "" if the function allows unsigned calls.

name: Due-soon email batch

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  invoke:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: "https://mavbnybtyfewfsihmuri.supabase.co"
      SUPABASE_ANON_KEY: "sb_publishable_dB_z1XDmVoMJDMDpNPnpgg_ITdi4C3d"
      CRON_SECRET: ""
    steps:
      - name: POST due_soon_batch
        run: |
          set -e
          curl -sS -X POST "${SUPABASE_URL}/functions/v1/send-event-notification" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${CRON_SECRET}" \
            -d '{"kind":"due_soon_batch"}'
